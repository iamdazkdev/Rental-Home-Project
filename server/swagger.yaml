openapi: 3.0.0
info:
  title: Rento API Documentation
  description: API documentation for Rental Home Project Backend
  version: 1.0.0
servers:
  - url: http://localhost:3001
    description: Development server
paths:
  /health:
    get:
      summary: API Health Check
      description: Returns the health status of the API, database connection, and uptime.
      tags:
        - System
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Rento Server is running
                  uptime:
                    type: number
                    example: 123.45
                  dbStatus:
                    type: string
                    example: connected
                  timestamp:
                    type: string
                    example: "2026-05-07T10:00:00.000Z"
